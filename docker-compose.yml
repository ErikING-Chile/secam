version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: secam-postgres
    environment:
      POSTGRES_USER: secam
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secam_dev_password}
      POSTGRES_DB: secam
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secam"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache + Queue
  redis:
    image: redis:7-alpine
    container_name: secam-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Cloud API (FastAPI Backend)
  cloud-api:
    build:
      context: ./apps/cloud-api
      dockerfile: Dockerfile
    container_name: secam-cloud-api
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://secam:${POSTGRES_PASSWORD:-secam_dev_password}@postgres:5432/secam
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ENVIRONMENT: development
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/cloud-api:/app
      - ./data/storage:/app/storage
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Web Frontend (Next.js)
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: secam-web
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
      - HOST=0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      - cloud-api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: npm run dev

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: secam-nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./infra/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - cloud-api
      - web

volumes:
  postgres_data:
  redis_data:
  storage:
